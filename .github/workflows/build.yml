name: Build LSPosed Module
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # or latest v4 if available
      with:
        gradle-version: '8.4'
     
    - name: Build with Gradle
      run: gradle assembleRelease --refresh-dependencies
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Animetail-Elite-Module
        path: app/build/outputs/apk/release/*.apk
